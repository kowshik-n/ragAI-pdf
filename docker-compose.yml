version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage

  server:
    build:
      context: ./server
    ports:
      - '8000:8000'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=langchainjs-testing
      - PORT=8000
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./server/uploads:/app/uploads

  worker:
    build:
      context: ./server
    command: ["node", "worker.js"]
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_COLLECTION_NAME=langchainjs-testing
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - server

volumes:
  qdrant_data:
